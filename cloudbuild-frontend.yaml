# War Room Frontend — Cloud Build → Cloud Run (project: warroom-498513)
#
# NEXT_PUBLIC_* values are inlined into the JS bundle at build time, so they
# MUST be passed as Docker --build-arg (not runtime env). They are hardcoded
# below as literal values — NOT substitutions — so trigger-level substitution
# overrides physically cannot interfere. To rotate any of these (e.g. point at
# a different backend or Firebase project) edit this file and push.
#
# The Firebase web config keys are PUBLIC client identifiers (they ship to the
# browser by design) — safe to commit. The backend independently verifies every
# ID token via the Admin SDK.

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://warroom-backend-git-262374983592.us-central1.run.app/api'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyCsW8E4bqQWUSzuXmYZobZgZXmLG1aNkiI'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=warroom-498513.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=warroom-498513'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=warroom-498513.firebasestorage.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=262374983592'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:262374983592:web:efbc1df702a94720bc3f9d'
      - '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'warroom-git'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_API_URL=https://warroom-backend-git-262374983592.us-central1.run.app/api'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
